name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: nest_monolith_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create test environment file
        run: cp .env.test.example .env.test

      - name: Generate Prisma Client
        run: pnpm db:generate

      - name: Lint
        run: pnpm lint:es:check

      - name: Type check
        run: pnpm lint:ts

      - name: Format check
        run: pnpm format:check

      - name: Build
        run: pnpm build

      - name: Coverage
        run: pnpm coverage
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/nest_monolith_test?schema=public
          REDIS_HOST: localhost
          REDIS_PORT: 6379

      - name: Run e2e tests
        run: pnpm test:e2e

      - name: Upload coverage reports
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7
