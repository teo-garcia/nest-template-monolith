services:
  db:
    ports: !reset []
    volumes: !override
      - postgres_data:/var/lib/postgresql

  redis:
    ports: !reset []

  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    environment:
      NODE_ENV: production
      API_PREFIX: ${API_PREFIX:-/api/v1}
      DOCS_ENABLED: ${DOCS_ENABLED:-false}
      OPENAPI_SERVER_URL: ${OPENAPI_SERVER_URL:-http://localhost:3000}
      DATABASE_URL: postgresql://${DATABASE_USER:-postgres}:${DATABASE_PASSWORD:-postgres}@db:5432/${DATABASE_NAME:-nest_monolith}?schema=public
      DATABASE_POOL_MAX: ${DATABASE_POOL_MAX:-10}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_TTL: ${REDIS_TTL:-3600}
      PORT: ${PORT:-3000}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_OUTPUT: ${LOG_OUTPUT:-json}
      CORS_ENABLED: ${CORS_ENABLED:-true}
      CORS_ORIGIN: ${CORS_ORIGIN:?Set CORS_ORIGIN to the deployed frontend origin}
      THROTTLE_TTL: ${THROTTLE_TTL:-60}
      THROTTLE_LIMIT: ${THROTTLE_LIMIT:-100}
      METRICS_ENABLED: ${METRICS_ENABLED:-true}
    ports: !reset []
    volumes: !reset []

  nginx:
    image: nginx:1.27-alpine
    container_name: nest_monolith_nginx
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-8080}:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test:
        ["CMD-SHELL", "wget -q --spider http://localhost/health/live || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - nest-network

  pgadmin:
    profiles:
      - local-tools
